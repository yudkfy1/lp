<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>テストLP | Deploy Check</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="container">
      <h1>デプロイ検証用ランディングページ</h1>
      <p class="lead">GitHub → Vercel 自動デプロイの動作確認用サンプルです。</p>
      <a href="#contact" class="btn">お問い合わせ</a>
    </div>
  </header>

  <section class="features">
    <div class="container">
      <h2>3つの特徴</h2>
      <div class="cards">
        <div class="card">
          <h3>高速</h3>
          <p>静的HTMLで軽量・高速表示。</p>
        </div>
        <div class="card">
          <h3>自動デプロイ</h3>
          <p>GitHubにpushするだけでVercelが自動公開。</p>
        </div>
        <div class="card">
          <h3>低コスト</h3>
          <p>Vercel無料枠で運用可能。</p>
        </div>
      </div>
    </div>
  </section>

  <section id="contact" class="cta">
    <div class="container">
      <h2>デプロイ確認テスト成功</h2>
      <p>この画面がVercelのURLで表示されればOKです。</p>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Test LP</p>
  </footer>
</body>
</html>
