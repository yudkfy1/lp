<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LP制作ポートフォリオ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Noto Sans JP", -apple-system, sans-serif;
      color: #2b2b2b;
      background: #f7f7fb;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 80px 24px; }
    header {
      text-align: center;
      margin-bottom: 64px;
      padding-bottom: 32px;
      border-bottom: 1px solid #e2e5eb;
    }
    header h1 {
      font-size: 32px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #1e5aa8, #f5a623);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p { color: #6b6b6b; font-size: 14px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid #e2e5eb;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }
    .thumb {
      aspect-ratio: 16/10;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 72px;
    }
    .thumb-koen { background: linear-gradient(135deg, #e5231c, #4a0000); }
    .thumb-brighthope { background: linear-gradient(135deg, #1e5aa8, #f5a623); }
    .body { padding: 24px; }
    .type {
      display: inline-block;
      background: #eaf2fc;
      color: #1e5aa8;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .type.test { background: #fdecea; color: #c62828; }
    .body h2 { font-size: 18px; margin-bottom: 8px; }
    .body p { color: #6b6b6b; font-size: 13px; }
    footer {
      margin-top: 80px;
      text-align: center;
      color: #6b6b6b;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>LP制作ポートフォリオ</h1>
      <p>制作したランディングページ・コーポレートサイトの一覧です</p>
    </header>

    <div class="grid">
      <a href="brighthope/index.html" class="card">
        <div class="thumb thumb-brighthope">🚛</div>
        <div class="body">
          <span class="type">CORPORATE SITE</span>
          <h2>合同会社BrightHope</h2>
          <p>軽貨物運送 × 中古車オークション代行の複数ページコーポレートサイト。安心と透明性を伝える王道デザイン。</p>
        </div>
      </a>

      <a href="koen/index.html" class="card">
        <div class="thumb thumb-koen">🔥</div>
        <div class="body">
          <span class="type test">TEST / SAMPLE</span>
          <h2>灼熱麻辣湯 紅焔</h2>
          <p>麻辣湯専門店の1枚LP。辛さと痺れを視覚化した赤×黒×金の中華ストリート感（テスト制作）。</p>
        </div>
      </a>
    </div>

    <footer>
      <p>© 2026 LP Portfolio</p>
    </footer>
  </div>
</body>
</html>
